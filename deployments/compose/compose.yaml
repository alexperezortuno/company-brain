name: ${COMPOSE_PROJECT_NAME:-open-company-brain}

services:
  postgres:
    image: postgres:17.9-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brain}
      POSTGRES_USER: ${POSTGRES_USER:-brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brain} -d ${POSTGRES_DB:-brain}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [brain]

  migrate:
    image: postgres:17.9-alpine3.23
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-brain}
      POSTGRES_DB: ${POSTGRES_DB:-brain}
    volumes:
      - ../postgres/migrations:/migrations:ro
      - ../postgres/migrate.sh:/migrate.sh:ro
    command: ["sh", "/migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [brain]

  redis:
    image: redis:8.0.3-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [brain]

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
    networks: [brain]

  minio:
    image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [brain]

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    entrypoint: >-
      /bin/sh -c '
      mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing "local/${MINIO_BUCKET:-company-brain}";
      mc anonymous set none "local/${MINIO_BUCKET:-company-brain}";
      '
    depends_on:
      minio:
        condition: service_healthy
    networks: [brain]

  knowledge-worker:
    build:
      context: ../../apps/knowledge-worker
    restart: unless-stopped
    environment:
      BRAIN_CONFIG_PATH: /app/config/brain.yaml
    volumes:
      - ../../config:/app/config:ro
      - ../../data/documents:/data/documents:ro
    expose: ["8090"]
    ports:
      - "127.0.0.1:${WORKER_HTTP_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/live', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [brain]

  brain-api:
    build:
      context: ../../apps/brain-api
    restart: unless-stopped
    environment:
      BRAIN_HTTP_ADDRESS: :8080
      BRAIN_CONFIG_PATH: /app/config/brain.yaml
      POSTGRES_ADDRESS: postgres:5432
      REDIS_ADDRESS: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      QDRANT_URL: http://qdrant:6333/
      MINIO_HEALTH_URL: http://minio:9000/minio/health/live
      WORKER_HEALTH_URL: http://knowledge-worker:8090/health
    volumes:
      - ../../config:/app/config:ro
    ports:
      - "${BRAIN_HTTP_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      knowledge-worker:
        condition: service_healthy
    networks: [brain]

  ollama:
    image: ollama/ollama:0.11.4
    restart: unless-stopped
    profiles: ["local-ai"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434"
    networks: [brain]

networks:
  brain:
    name: ${COMPOSE_PROJECT_NAME:-open-company-brain}_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_data:
